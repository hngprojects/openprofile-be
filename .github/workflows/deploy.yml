name: CI/CD Pipeline

on:
  push:
    branches: [feat/cicd-setup, dev, staging, main]
  pull_request:
    branches: [feat/cicd-setup, dev, staging, main]

jobs:
  ci:
    name: CI — Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: ${{ secrets.TEST_DB_USER }}
      DATABASE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      DATABASE_NAME: ${{ secrets.TEST_DB_NAME }}
      DATABASE_SYNC: false
      DATABASE_SSL: false
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:3000/
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_SECURE: ${{ secrets.MAIL_SECURE }}
      SWAGGER_ENABLED: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test

  deploy-dev:
    name: Deploy — Dev
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be
            git pull origin dev
            npm ci --production
            npm run build
            npm run migration:run
            pm2 restart openprofile-dev-be || pm2 start dist/main.js --name openprofile-dev-be
            pm2 save

  deploy-staging:
    name: Deploy — Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be
            git pull origin staging
            npm ci --production
            npm run build
            npm run migration:run
            pm2 restart openprofile-staging-be || pm2 start dist/main.js --name openprofile-staging-be
            pm2 save

  deploy-production:
    name: Deploy — Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be
            git pull origin main
            npm ci --production
            npm run build
            npm run migration:run
            pm2 restart openprofile-prod-be || pm2 start dist/main.js --name openprofile-prod-be
            pm2 save