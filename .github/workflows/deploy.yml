name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

  push:
    branches:
      # - feat/cd-pipeline
      # - dev
      - staging
      - main
  
  # pull_request:
  #   branches:
  #     - feat/cd-pipeline
  #     - dev
  #     - staging
  #     - main
jobs:

# ─── CI — Lint, Test, Build ───────
  ci:
    name: CI — Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_NAME: test_db
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-only-access-secret-minimum-32-chars
      JWT_REFRESH_SECRET: ci-only-refresh-secret-minimum-32-chars
      JWT_RESET_SECRET: ci-only-refresh-secret-minimum-32-chars
      APP_URL: http://localhost:3000
      RESEND_API_KEY: your_resend_api_key
      MAIL_FROM: 'test@test.com'
      MAIL_SECURE: true
      FRONTEND_URL: http://localhost:3000
      CLIENT_ID: test-client-id
      CLIENT_SECRET: test-client-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run migrations
        run: npm run migration:run

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  deploy-staging:
    name: Deploy — Staging
    needs: ci
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') || (github.event_name == 'push' && github.ref == 'refs/heads/staging')
    #environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./"
          target: /var/www/openprofile-be/staging

      - name: Copy env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be
            cp envfile/.env.staging  staging/.env

      - name: Install dependencies and build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./"
          target: /var/www/openprofile-be/staging

      - name: Copy env, install, build, migrate, and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/openprofile-be

            # Env file
            cp envfile/.env.staging staging/.env

            cd staging

            npm install
            npm run build

            # Run migrations
            npm run migration:run

            pm2 restart openprofile-staging-be || pm2 start "npm start" --name openprofile-staging-be
            pm2 save

  
  # ─── Deploy — Main (Production) ───────────────
  deploy-main:
    name: Deploy — Main
    needs: ci
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    #environment: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./"
          target: /var/www/openprofile-be/main

      - name: Copy env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be
            cp envfile/.env.prod  main/.env

      - name: Install dependencies and build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/openprofile-be/main
            npm install
            npm run build
            
            # Run migrations
            npm run migration:run

      - name: Start app with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/openprofile-be/main
            pm2 restart openprofile-main-be || pm2 start "npm run start:prod" --name openprofile-main-be
            pm2 save
