name: CI/CD Pipeline

on:
  push:
    branches:
      - feat/cicd-setup
      - dev
      - staging
      - main

  pull_request:
    branches:
      - feat/cicd-setup
      - dev
      - staging
      - main

jobs:
  ci:
    name: CI — Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      NODE_ENV: test

      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_NAME: test_db

      REDIS_URL: redis://localhost:6379

      JWT_ACCESS_SECRET: ci-only-access-secret-minimum-32-chars
      JWT_REFRESH_SECRET: ci-only-refresh-secret-minimum-32-chars

      APP_URL: http://localhost:3000

      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 465
      MAIL_USER: test@test.com
      MAIL_PASS: test-password
      MAIL_FROM: test@test.com
      MAIL_SECURE: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run migrations
        run: npm run migration:run

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  deploy-dev:
    name: Deploy — Dev
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            cd /var/www/openprofile-be

            git pull origin dev

            npm ci

            npm run build

            npm run migration:run

            pm2 restart openprofile-dev-be || pm2 start dist/main.js --name openprofile-dev-be

            pm2 save

  deploy-staging:
    name: Deploy — Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            cd /var/www/openprofile-be

            git pull origin staging

            npm ci

            npm run build

            npm run migration:run

            pm2 restart openprofile-staging-be || pm2 start dist/main.js --name openprofile-staging-be

            pm2 save

  deploy-production:
    name: Deploy — Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            cd /var/www/openprofile-be

            git pull origin main

            npm ci

            npm run build

            npm run migration:run

            pm2 restart openprofile-prod-be || pm2 start dist/main.js --name openprofile-prod-be

            pm2 save