  deploy-staging:
    name: Deploy — Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Server
        uses: appleboy/scp-action@v0.1.7
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./"
          target: /var/www/openprofile-be/staging

      - name: copy env file
      - uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cp /home/techgoddess-op/env.staging /var/www/openprofile-be/staging

      - name: install dependencies && build
      - uses: appleboy/ssh-action@v1.0.3
      - with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be/staging

            npm install
            
            npm run build

      - name: run migration
      - uses: appleboy/ssh-action@v1.0.3
      - with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be/staging
            
            git diff --name-only HEAD~1 HEAD | grep -q 'src/database/migrations' && npm run migration:run || echo "No migration changes, skipping"

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            /var/www/openprofile-be/staging

            pm2 restart openprofile-staging-be || pm2 start "npm start" --name openprofile-staging-be

            pm2 save


  deploy-main:
    name: Deploy — Main
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Server
        uses: appleboy/scp-action@v0.1.7
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./"
          target: /var/www/openprofile-be/main

      - name: copy env file
      - uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cp /home/techgoddess-op/env.main /var/www/openprofile-be/main

      - name: install dependencies && build
      - uses: appleboy/ssh-action@v1.0.3
      - with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be/main

            npm install
            
            npm run build

      - name: run migration
      - uses: appleboy/ssh-action@v1.0.3
      - with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/openprofile-be/main
            
            git diff --name-only HEAD~1 HEAD | grep -q 'src/database/migrations' && npm run migration:run || echo "No migration changes, skipping"

      - name: Deploy to main server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            /var/www/openprofile-be/main

            pm2 restart openprofile-main-be || pm2 start "npm run start:prod" --name openprofile-main-be
            
            pm2 save

