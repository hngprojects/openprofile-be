name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_NAME: test_db
      JWT_ACCESS_SECRET: ci-only-not-a-real-secret-access-key-min-32-chars
      JWT_REFRESH_SECRET: ci-only-not-a-real-secret-refresh-key-min-32-chars
      JWT_RESET_SECRET: ci-only-not-a-real-secret-reset-key-min-32-chars-x
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:3000

      RESEND_API_KEY: your_resend_api_key
      MAIL_FROM: 'test@test.com'
      FRONTEND_URL: localhost:5000
      MAIL_SECURE: true
      CLIENT_ID: your_client_id
      CLIENT_SECRET: your client secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run migrations
        run: npm run migration:run

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build