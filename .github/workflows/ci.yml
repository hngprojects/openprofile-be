name: CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  test-unit:
    runs-on: ubuntu-latest

    env:
      JWT_ACCESS_SECRET: ci-only-not-a-real-secret-access-key-min-32-chars
      JWT_REFRESH_SECRET: ci-only-not-a-real-secret-refresh-key-min-32-chars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build project
        run: npm run build

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_NAME: test_db
      JWT_ACCESS_SECRET: ci-only-not-a-real-secret-access-key-min-32-chars
      JWT_REFRESH_SECRET: ci-only-not-a-real-secret-refresh-key-min-32-chars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migration:run

      - name: Run e2e tests
        run: npm run test:e2e